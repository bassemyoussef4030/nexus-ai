<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Nexus Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8b5cf6">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        :root { --p: #8b5cf6; --bg: #050508; --card: #0f172a; --border: #1e293b; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui; }
        body { background: var(--bg); color: #fff; height: 100dvh; display: flex; justify-content: center; overflow: hidden; }
        .app-container { width: min(500px, 100vw); height: 100dvh; display: flex; flex-direction: column; background: #000; border-inline: 1px solid var(--border); position: relative; }
        .telemetry { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 10px; background: var(--card); border-bottom: 2px solid var(--p); }
        .stat-box { background: rgba(0,0,0,0.4); padding: 5px; border-radius: 6px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .stat-label { font-size: 8px; color: #94a3b8; text-transform: uppercase; }
        .stat-val { font-size: 11px; font-weight: bold; color: var(--p); display: block; font-family: monospace; }
        .setup-area { padding: 15px; flex-shrink: 0; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: #0f172a; color: #fff; font-size: 13px; outline: none; margin-bottom: 10px; }
        .btn { padding: 12px 18px; border-radius: 10px; border: none; background: var(--p); color: #fff; font-weight: bold; cursor: pointer; width: 100%; }
        .results-dropdown { max-height: 150px; overflow-y: auto; background: var(--card); border-radius: 10px; margin-bottom: 10px; display: none; }
        .model-item { padding: 10px; border-bottom: 1px solid #1e293b; cursor: pointer; font-size: 12px; }
        .chat-view { flex: 1; overflow-y: auto; padding: 15px; display: none; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 85%; font-size: 14px; line-height: 1.5; }
        .user { align-self: flex-start; background: var(--border); border-bottom-left-radius: 2px; }
        .ai { align-self: flex-end; background: linear-gradient(135deg, #6d28d9, #4338ca); border-bottom-right-radius: 2px; }
        #loader { position: absolute; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
        .prog-bg { width: 100%; height: 6px; background: #111; border-radius: 10px; margin: 20px 0; overflow: hidden; }
        #pBar { height: 100%; width: 0%; background: var(--p); transition: 0.3s; }
        .footer { padding: 15px; background: #000; border-top: 1px solid var(--border); display: flex; gap: 8px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="telemetry">
        <div class="stat-box"><span class="stat-label">السرعة</span><span id="tps" class="stat-val">0.0 t/s</span></div>
        <div class="stat-box"><span class="stat-label">الذاكرة</span><span id="ram" class="stat-val">-- MB</span></div>
        <div class="stat-box"><span class="stat-label">المعالج</span><span id="gpu" class="stat-val">...</span></div>
    </div>

    <div id="pane-setup" class="setup-area">
        <input type="text" id="hfSearch" placeholder="ابحث في Hugging Face (مثلاً: Qwen 2.5)..." oninput="searchModels()">
        <div id="results" class="results-dropdown"></div>
        <input type="text" id="targetUrl" placeholder="رابط النموذج المختار...">
        <button class="btn" onclick="bootSystem()">تثبيت وتفعيل المحرك</button>
    </div>

    <div id="pane-chat" class="chat-view"><div id="chat-content"></div></div>

    <div id="chat-input-bar" class="footer" style="display:none;">
        <input type="text" id="userMsg" placeholder="اكتب هنا..." style="margin:0;">
        <button class="btn" onclick="handleSend()" style="width:auto;">↑</button>
    </div>

    <div id="loader">
        <h1 id="pPerc" style="color:var(--p); font-size: 40px;">0%</h1>
        <div class="prog-bg"><div id="pBar"></div></div>
        <p id="lStatus" style="font-size: 10px; color: #64748b;">جاري التحميل...</p>
    </div>
</div>

<script type="module">
    import * as webllm from "https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm@0.2.46/+esm";
    
    // تسجيل Service Worker للـ PWA
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    let engine;
    const DB_KEY = "NEXUS_STORAGE";

    window.onload = () => {
        const saved = JSON.parse(localStorage.getItem(DB_KEY) || "[]");
        saved.forEach(m => renderMsg(m.role, m.content));
        if (navigator.gpu) navigator.gpu.requestAdapter().then(a => document.getElementById('gpu').innerText = a.name.split(' ')[0]);
    };

    window.searchModels = async () => {
        const q = document.getElementById('hfSearch').value;
        const resDiv = document.getElementById('results');
        if (q.length < 3) return resDiv.style.display = 'none';
        
        try {
            const r = await fetch(`https://huggingface.co/api/models?search=${q}&filter=mlc&limit=4`);
            const models = await r.json();
            resDiv.innerHTML = '';
            resDiv.style.display = 'block';
            models.forEach(m => {
                const d = document.createElement('div');
                d.className = 'model-item';
                d.innerText = m.id;
                d.onclick = () => { document.getElementById('targetUrl').value = `https://huggingface.co/${m.id}`; resDiv.style.display = 'none'; };
                resDiv.appendChild(d);
            });
        } catch(e) {}
    };

    window.bootSystem = async () => {
        const url = document.getElementById('targetUrl').value;
        const modelId = url.split('/').filter(Boolean).pop();
        document.getElementById('loader').style.display = 'flex';
        try {
            engine = new webllm.MLCEngine();
            engine.setInitProgressCallback(r => {
                const p = Math.round(r.progress * 100);
                document.getElementById('pBar').style.width = p + "%";
                document.getElementById('pPerc').innerText = p + "%";
                if(p >= 100) { 
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('pane-setup').style.display = 'none';
                    document.getElementById('pane-chat').style.display = 'flex';
                    document.getElementById('chat-input-bar').style.display = 'flex';
                }
            });
            await engine.reload(modelId, { model_list: [{"model": url, "model_id": modelId, "model_lib": `https://raw.githubusercontent.com/mlc-ai/binary-mlc-llm-libs/main/web-llm-models/v0_2_48/${modelId}.wasm`}], appConfig: {useIndexedDB: true}});
        } catch(e) { alert("خطأ في التحميل!"); document.getElementById('loader').style.display = 'none'; }
    };

    window.handleSend = async () => {
        const input = document.getElementById('userMsg');
        const text = input.value;
        if(!text) return;
        renderMsg('user', text); saveMsg('user', text); input.value = "";
        const aiId = 'ai_' + Date.now();
        renderMsg('assistant', '...', aiId);
        try {
            let full = "", tokens = 0; const t0 = performance.now();
            const chunks = await engine.chat.completions.create({ messages: JSON.parse(localStorage.getItem(DB_KEY)).slice(-6), stream: true });
            for await (const c of chunks) {
                full += c.choices[0]?.delta?.content || "";
                tokens++;
                document.getElementById('tps').innerText = (tokens / ((performance.now()-t0)/1000)).toFixed(1) + " t/s";
                document.getElementById(aiId).innerText = full;
                document.getElementById('pane-chat').scrollTop = 99999;
            }
            saveMsg('assistant', full);
        } catch(e) {}
    };

    function saveMsg(r, c) { const h = JSON.parse(localStorage.getItem(DB_KEY) || "[]"); h.push({role: r, content: c}); localStorage.setItem(DB_KEY, JSON.stringify(h)); }
    function renderMsg(r, t, id = '') { const d = document.createElement('div'); d.className = `msg ${r==='assistant'?'ai':'user'}`; if(id) d.id = id; d.innerText = t; document.getElementById('chat-content').appendChild(d); document.getElementById('pane-chat').scrollTop = 99999; }
</script>
</body>
</html>
